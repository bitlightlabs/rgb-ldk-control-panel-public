# Local multi-node Docker Compose for rgb-ldk-control-panel.
# Start here: read GET-STARTED.md.

services:
  rgbldk_node_1:
    image: bitlightlabs/rln-ldk-node:main-23036538398
    container_name: rgb-node-alice
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8500" # main API
      - "127.0.0.1:8551:8550" # control HTTP
      - "127.0.0.1:9735:9735" # P2P
    volumes:
      - node1_data:/home/rgbldk/.ldk-node
      - ./example/node1/secrets/http.token:/run/secrets/rgbldk_http_token:ro
      - ./example/node1/secrets/control-http.token:/run/secrets/rgbldk_control_http_token:ro
      - ./example/node1/secrets/keystore.passphrase:/run/secrets/rgbldk_keystore_passphrase:ro
    command:
      - rgbldkd
      - server
      - --listen
      - 0.0.0.0:8500
      - --allow-non-loopback-listen
      - --http-token-file
      - /run/secrets/rgbldk_http_token
      - --control-http-listen
      - 0.0.0.0:8550
      - --control-http-allow-non-loopback
      - --control-http-token-file
      - /run/secrets/rgbldk_control_http_token
      - --control-http-allow-unlock
      - --control-http-allow-lock
      - --data-dir
      - /home/rgbldk/.ldk-node
      - --keystore-passphrase-file
      - /run/secrets/rgbldk_keystore_passphrase
      - --auto-init-keystore
      - --network
      - regtest
      - --esplora-url
      - https://bitcoin-regtest-api.bitlightdev.info
      - --ldk-listen
      - 0.0.0.0:9735
      - --node-alias
      - alice
      - --rgb-enabled
      - --log-to-stdout
      - --log-level
      - trace
    networks:
      - rln_network

  rgbldk_node_2:
    image: bitlightlabs/rln-ldk-node:main-23036538398
    container_name: rgb-node-bob
    restart: unless-stopped
    ports:
      - "127.0.0.1:8602:8500" # main API
      - "127.0.0.1:8653:8550" # control HTTP
      - "127.0.0.1:9736:9735" # P2P
    volumes:
      - node2_data:/home/rgbldk/.ldk-node
      - ./example/node2/secrets/http.token:/run/secrets/rgbldk_http_token:ro
      - ./example/node2/secrets/control-http.token:/run/secrets/rgbldk_control_http_token:ro
      - ./example/node2/secrets/keystore.passphrase:/run/secrets/rgbldk_keystore_passphrase:ro
    command:
      - rgbldkd
      - server
      - --listen
      - 0.0.0.0:8500
      - --allow-non-loopback-listen
      - --http-token-file
      - /run/secrets/rgbldk_http_token
      - --control-http-listen
      - 0.0.0.0:8550
      - --control-http-allow-non-loopback
      - --control-http-token-file
      - /run/secrets/rgbldk_control_http_token
      - --control-http-allow-unlock
      - --control-http-allow-lock
      - --data-dir
      - /home/rgbldk/.ldk-node
      - --keystore-passphrase-file
      - /run/secrets/rgbldk_keystore_passphrase
      - --auto-init-keystore
      - --network
      - regtest
      - --esplora-url
      - https://bitcoin-regtest-api.bitlightdev.info
      - --ldk-listen
      - 0.0.0.0:9735
      - --node-alias
      - bob
      - --rgb-enabled
      - --log-to-stdout
      - --log-level
      - trace
    networks:
      - rln_network

networks:
  rln_network:
    driver: bridge

volumes:
  node1_data:
  node2_data:
