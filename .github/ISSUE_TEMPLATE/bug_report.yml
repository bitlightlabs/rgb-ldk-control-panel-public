name: Bug report
description: Report a problem with the control panel or local dev setup
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please avoid posting secrets (tokens, passphrases) in logs.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: App version or git commit SHA.
      placeholder: "e.g. v0.1.0 or abc1234"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app (Tauri)
        - UI (React)
        - Local Docker Compose (regtest)
        - E2E tests
        - Docs
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and expected vs actual behavior.
      placeholder: |
        1) ./scripts/bootstrap-local.sh
        2) ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets. Prefer attaching files when large.
    validations:
      required: false
